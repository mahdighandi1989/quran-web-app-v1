<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مرکز دادهٔ قرآن — نسخهٔ وب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root { color-scheme: light; }
      body{ font-family: "Vazirmatn", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; }
      *{ box-sizing: border-box; }
      .arabic input,.arabic textarea{ font-family:"Scheherazade New","Amiri","Noto Naskh Arabic","Vazirmatn",system-ui,sans-serif; }
      /* very small utility classes used by the app */
      .min-h-screen{ min-height: 100vh; }
      .bg-gray-50{ background: #f9fafb; }
      .bg-white{ background: #ffffff; }
      .bg-gray-100{ background:#f3f4f6; }
      .bg-gray-200{ background:#e5e7eb; }
      .bg-amber-50{ background:#fffbeb; }
      .bg-blue-600{ background:#2563eb; }
      .bg-green-600{ background:#16a34a; }
      .bg-orange-500{ background:#f97316; }
      .bg-red-100{ background:#fee2e2; }
      .text-white{ color:#fff; }
      .text-gray-900{ color:#111827; }
      .text-gray-800{ color:#1f2937; }
      .text-gray-600{ color:#4b5563; }
      .text-gray-500{ color:#6b7280; }
      .text-red-600{ color:#dc2626; }
      .p-4{ padding:1rem; }
      .p-5{ padding:1.25rem; }
      .p-3{ padding:.75rem; }
      .px-2{ padding-left:.5rem; padding-right:.5rem; }
      .px-3{ padding-left:.75rem; padding-right:.75rem; }
      .px-4{ padding-left:1rem; padding-right:1rem; }
      .py-1{ padding-top:.25rem; padding-bottom:.25rem; }
      .py-2{ padding-top:.5rem; padding-bottom:.5rem; }
      .py-3{ padding-top:.75rem; padding-bottom:.75rem; }
      .rounded-xl{ border-radius:.75rem; }
      .rounded-2xl{ border-radius:1rem; }
      .border{ border:1px solid #e5e7eb; }
      .shadow{ box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1); }
      .max-w-7xl{ max-width: 80rem; }
      .mx-auto{ margin-left:auto; margin-right:auto; }
      .mt-1{ margin-top:.25rem; }
      .mt-2{ margin-top:.5rem; }
      .mt-10{ margin-top:2.5rem; }
      .mb-1{ margin-bottom:.25rem; }
      .mb-6{ margin-bottom:1.5rem; }
      .space-y-3 > * + * { margin-top:.75rem; }
      .space-y-4 > * + * { margin-top:1rem; }
      .grid{ display:grid; }
      .gap-2{ gap:.5rem; }
      .gap-3{ gap:.75rem; }
      .gap-8{ gap:2rem; }
      .grid-cols-1{ grid-template-columns: repeat(1,minmax(0,1fr)); }
      @media (min-width: 640px){ .sm\:grid-cols-3{ grid-template-columns: repeat(3,minmax(0,1fr)); } .sm\:flex-row{ flex-direction:row; } .sm\:items-center{ align-items:center; } .sm\:justify-between{ justify-content:space-between; } }
      @media (min-width: 768px){ .md\:grid-cols-2{ grid-template-columns: repeat(2,minmax(0,1fr)); } .md\:grid-cols-6{ grid-template-columns: repeat(6,minmax(0,1fr)); } .md\:grid-cols-7{ grid-template-columns: repeat(7,minmax(0,1fr)); } .md\:text-3xl{ font-size:1.875rem; line-height:2.25rem; } }
      .flex{ display:flex; }
      .flex-wrap{ flex-wrap: wrap; }
      .items-center{ align-items:center; }
      .justify-between{ justify-content:space-between; }
      .gap-3{ gap:.75rem; }
      .w-full{ width:100%; }
      .w-fit{ width:fit-content; }
      .w-20{ width:5rem; }
      .w-24{ width:6rem; }
      .text-sm{ font-size:.875rem; }
      .text-xl{ font-size:1.25rem; }
      .text-2xl{ font-size:1.5rem; }
      .font-bold{ font-weight:700; }
      .font-extrabold{ font-weight:800; }
      .rounded-lg{ border-radius:.5rem; }
      button{ cursor:pointer; }
      .animate-pulse{ animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse{ 0%,100%{ opacity:1;} 50%{ opacity:.5;} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
