# 🤖 Claude Auto Task Runner (auto-generated by oversight backend)
#
# این فایل خودکار توسط پنل oversight روی این ریپو نصب شده است.
# هرگاه تسکی به فولدر prompt/ این ریپو push شود (توسط backend sync یا
# دستی)، GitHub Actions این workflow را trigger می‌کند و Claude Code
# تسک‌های pending را به ترتیب اولویت اجرا می‌کند.
#
# برای غیرفعال کردن: از پنل oversight روی این پروژه، toggle «اجرای
# خودکار با Claude Code» را خاموش کنید — این فایل خودکار حذف می‌شود.
# (یا این فایل را manually delete کنید.)

name: Claude Auto Task Runner

# 'on' را به‌صورت string quote می‌کنیم چون در YAML 1.1، on/off/yes/no
# مقدار boolean هستند. GitHub Actions هر دو فرم را می‌پذیرد ولی این
# فرم با همهٔ YAML parserها سازگار است.
"on":
  # claude-code-action@v1 روی push event کار نمی‌کند
  # ("Unsupported event type: push"). فقط workflow_dispatch پشتیبانی
  # می‌شود. backend پس از push شدن تسک به prompt/_index.json، خودکار
  # workflow را با GitHub API trigger می‌زند (dispatches endpoint).
  #
  # 🆕 (target_task_id) — اگر backend در حال retry روی یک تسک خاص است
  # (بعد از verify=partial)، task_id را در inputs می‌گذارد تا Claude
  # **همان** تسک را بگیرد، نه /next.
  workflow_dispatch:
    inputs:
      target_task_id:
        description: 'task_id خاص برای اجرا (اختیاری). اگر خالی، از /next گرفته می‌شود.'
        required: false
        type: string
      # 🆕 (dynamic model) — backend در زمان dispatch، آخرین مدل Opus/Sonnet/
      # Haiku را بر اساس tier تشخیص داده‌شده از prompt تسک می‌فرستد. این
      # یعنی هرگاه Anthropic مدل جدید بدهد (مثلاً claude-opus-5-0-...)، حداکثر
      # ۱ ساعت بعد (cache /v1/models) خودکار استفاده می‌شود — بدون redeploy و
      # بدون refresh YAML. اگر input خالی باشد (مثل dispatch دستی از GitHub
      # UI بدون پر کردن این فیلد)، fallback به alias `sonnet` که Claude Code
      # CLI خودش به آخرین Sonnet route می‌کند.
      claude_model:
        description: 'model id کامل یا alias (opus/sonnet/haiku). اگر خالی → sonnet.'
        required: false
        type: string
        default: ''

# 🛡 (concurrency strategy) — cancel-in-progress: false
# قبلاً true بود ولی یافتیم که runهای در حال اجرا را مید-اجرا cancel
# می‌کرد (Run #10 بعد از ۳ دقیقه اجرای واقعی، توسط Run #11 قطع شد).
#
# با false:
#   - in-progress run ادامه می‌دهد تا کاملاً تمام شود (Claude زمان دارد)
#   - queued runs اگر newer بیاید، جایگزین می‌شوند (فقط آخرین queued می‌ماند)
#
# combined با debounce 60s در backend و content-diff check، تعداد trigger
# های بی‌فایده به حداقل می‌رسد، پس setup-then-cancel نخواهیم داشت.
concurrency:
  group: claude-auto-task-c9e90b2b-4141-4012-b343-5a5f60b0268a
  cancel-in-progress: false

jobs:
  run-task:
    runs-on: ubuntu-latest
    # ⏰ کافی برای بزرگ‌ترین تسک‌ها (max-turns 250 × ~5 sec/turn = ~21 min
    # + setup + overhead). 90 دقیقه buffer امن دارد.
    timeout-minutes: 90
    permissions:
      contents: write       # برای commit + push به main
      pull-requests: write  # ذخیره برای آینده (الان استفاده نمی‌کنیم)
      id-token: write       # احیاناً برای OIDC در آینده
    steps:
      - name: Checkout (full history برای push کردن)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # token پیش‌فرض ACTIONS_GITHUB_TOKEN است — برای push کفایت می‌کند.
          # برای جلوگیری از infinite loop، commit messages ما حاوی
          # [skip ci] خواهد بود تا re-trigger نشوند.

      - name: Run Claude Code (headless)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 250 --model ${{ github.event.inputs.claude_model || 'sonnet' }} --dangerously-skip-permissions"
          prompt: |
            وظیفه‌ات: **فقط یک تسک** را اجرا کن سپس exit کن.
            
            ## نکتهٔ بسیار مهم درباره curl ها
            
            **همهٔ** فراخوانی‌های backend (claim/complete/fail) باید این flags داشته باشند:
              `-fsS --max-time 180 --retry 5 --retry-delay 8 --retry-all-errors -w "\nHTTP:%{http_code}\n"`
            بعد از هر curl، **حتماً** HTTP status را چک کن. اگر 2xx نبود، با /fail
            گزارش بده و سپس **`exit 1`** بزن. هرگز با curl ناموفق exit موفق نکن.
            (دلیل: backend ممکن است روی Render free tier از sleep بیدار شود — تا
            ۶۰ ثانیه طول می‌کشد. --max-time و --retry برای این طراحی شده.)
            
            ## مرحله ۱ — تعیین task_id
            
            **اگر $TARGET_TASK_ID خالی نیست** (یعنی backend در حال retry روی یک تسک
            خاص است): همان task_id را استفاده کن. برو مستقیم به مرحله ۲ (هنوز باید
            /claim بزنی).
            
            **اگر $TARGET_TASK_ID خالی است** (chain-next نرمال): لیست را بگیر:
            
            ```bash
            curl -fsS --max-time 180 --retry 5 --retry-delay 8 --retry-all-errors \
              -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -w "\nHTTP:%{http_code}\n" \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/next?watched_id=$WATCHED_ID&limit=1" \
              -o /tmp/next.json || { echo 'next failed'; exit 1; }
            ```
            
            اولین task_id را از /tmp/next.json بردار. اگر لیست خالی است → 
            `echo 'no pending tasks'` و **موفق exit** کن (exit 0).
            
            ## مرحله ۲ — claim کن (الزامی — حتی با TARGET_TASK_ID)
            
            ```bash
            HTTP_CODE=$(curl -fsS --max-time 180 --retry 5 --retry-delay 8 --retry-all-errors \
              -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action"}' \
              -w "%{http_code}" -o /tmp/claim.json \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/claim") || \
              { echo 'claim curl failed'; exit 1; }
            if [ "$HTTP_CODE" = "409" ]; then echo 'already claimed — exit'; exit 0; fi
            if [ "$HTTP_CODE" != "200" ]; then echo "claim failed HTTP=$HTTP_CODE"; cat /tmp/claim.json; exit 1; fi
            ```
            
            ## مرحله ۳ — فایل تسک را کامل بخوان
            
            `cat prompt/<task_id>.md` (نه head/tail/sed). محتوا = پرامپت + AC + Steps.
            
            ## مرحله ۴ — کار را انجام بده
            
            هر AC را پیاده‌سازی کن. کد را با Edit/Write بنویس، تست کن.
            
            ## مرحله ۵ — commit و push مستقیم به main
            
            ```bash
            git add -A
            git commit -m "[<task_id>] <خلاصهٔ کوتاه>" || echo 'no changes'
            git push origin main || { git pull --rebase origin main && git push origin main; } || exit 1
            ```
            
            هرگز PR نزن. هرگز branch جدا نساز. مستقیم به main.
            
            ## مرحله ۶ — complete اعلام کن (حیاتی — اگر اینجا fail شود، تسک معلق می‌ماند)
            
            ```bash
            HTTP_CODE=$(curl -fsS --max-time 180 --retry 5 --retry-delay 8 --retry-all-errors \
              -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action","summary":"<چه کاری شد>"}' \
              -w "%{http_code}" -o /tmp/complete.json \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/complete") || \
              { echo 'complete curl FAILED — task will be stuck'; exit 1; }
            if [ "$HTTP_CODE" != "200" ]; then
              echo "complete returned HTTP=$HTTP_CODE"; cat /tmp/complete.json
              # backend ممکن است claim mismatch داشته باشد — قبل از exit، fail بزن
              curl -fsS --max-time 60 --retry 3 -X POST \
                -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"agent_id\":\"claude-code-action\",\"error\":\"complete returned HTTP=$HTTP_CODE\"}" \
                "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/fail" || true
              exit 1
            fi
            echo 'complete OK — exit'
            ```
            
            سپس exit 0. (backend پس از /complete موفق، verify-after-complete را اجرا
            می‌کند و سپس برای تسک بعدی workflow را دوباره trigger می‌کند.)
            
            ## در صورت شکست در هر مرحلهٔ کار
            
            ```bash
            curl -fsS --max-time 180 --retry 5 --retry-delay 8 --retry-all-errors \
              -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action","error":"<reason>"}' \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/fail" || true
            exit 1
            ```
            
            ## قواعد کلیدی
            
            - TO-DO فقط برای: credential کاربر، تصمیم سلیقه‌ای کاربر، account/billing
              سرویس خارجی. هرگز برای UI، endpoint، migration، test، integration
              (با stub بساز).
            - اگر تسک نیاز به credential دارد → /fail با reason "needs user credential".
            - مستقیم به main commit و push (no PR، no branch).
            - فقط **یک تسک** را در این run اجرا کن، سپس exit. هرگز loop نکن.
            - **هرگز exit 0 بدون /complete موفق نکن.** اگر /complete fail شد → exit 1.
            
            ## ⏰ بودجهٔ turn
            
            max-turns = **250** (فضای کافی برای بزرگترین تسک‌ها). از تمام بودجه
            استفاده کن تا تسک را **کامل و درست** تمام کنی. هرگز عجله نکن، هرگز
            AC را skip نکن.
            
            **فقط در حالت اضطراری** (اگر بعد از ~220 turn هنوز کار تمام نشده،
            یعنی تسک واقعاً غیرعادی بزرگ است):
            1. commit + push آنچه تا الان انجام شده
            2. POST /fail با reason "task too large: completed N of M ACs"
            3. exit 1
            
            این فقط emergency است. برای تسک عادی، از همه بودجه استفاده کن تا
            complete واقعی بزنی.
        env:
          OVERSIGHT_BACKEND_URL: ${{ secrets.OVERSIGHT_BACKEND_URL }}
          OVERSIGHT_EXTERNAL_TOKEN: ${{ secrets.OVERSIGHT_EXTERNAL_TOKEN }}
          WATCHED_ID: "c9e90b2b-4141-4012-b343-5a5f60b0268a"
          REPO_FULL_NAME: "mahdighandi1989/quran-web-app-v1"
          # 🆕 (target_task_id) — اگر backend در حال retry روی یک تسک خاص است
          # (بعد از verify=partial)، این مقدار task_id را به master prompt
          # می‌رساند تا Claude همان تسک را بگیرد به‌جای صدا زدن /next.
          # وقتی خالی است (chain-next نرمال)، Claude از /next استفاده می‌کند.
          TARGET_TASK_ID: ${{ github.event.inputs.target_task_id }}
