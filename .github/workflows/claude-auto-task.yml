# 🤖 Claude Auto Task Runner (auto-generated by oversight backend)
#
# این فایل خودکار توسط پنل oversight روی این ریپو نصب شده است.
# هرگاه تسکی به فولدر prompt/ این ریپو push شود (توسط backend sync یا
# دستی)، GitHub Actions این workflow را trigger می‌کند و Claude Code
# تسک‌های pending را به ترتیب اولویت اجرا می‌کند.
#
# برای غیرفعال کردن: از پنل oversight روی این پروژه، toggle «اجرای
# خودکار با Claude Code» را خاموش کنید — این فایل خودکار حذف می‌شود.
# (یا این فایل را manually delete کنید.)

name: Claude Auto Task Runner

# 'on' را به‌صورت string quote می‌کنیم چون در YAML 1.1، on/off/yes/no
# مقدار boolean هستند. GitHub Actions هر دو فرم را می‌پذیرد ولی این
# فرم با همهٔ YAML parserها سازگار است.
"on":
  # claude-code-action@v1 روی push event کار نمی‌کند
  # ("Unsupported event type: push"). فقط workflow_dispatch پشتیبانی
  # می‌شود. backend پس از push شدن تسک به prompt/_index.json، خودکار
  # workflow را با GitHub API trigger می‌زند (dispatches endpoint).
  workflow_dispatch: {}

# 🛡 (concurrency strategy) — cancel-in-progress: false
# قبلاً true بود ولی یافتیم که runهای در حال اجرا را مید-اجرا cancel
# می‌کرد (Run #10 بعد از ۳ دقیقه اجرای واقعی، توسط Run #11 قطع شد).
#
# با false:
#   - in-progress run ادامه می‌دهد تا کاملاً تمام شود (Claude زمان دارد)
#   - queued runs اگر newer بیاید، جایگزین می‌شوند (فقط آخرین queued می‌ماند)
#
# combined با debounce 60s در backend و content-diff check، تعداد trigger
# های بی‌فایده به حداقل می‌رسد، پس setup-then-cancel نخواهیم داشت.
concurrency:
  group: claude-auto-task-c9e90b2b-4141-4012-b343-5a5f60b0268a
  cancel-in-progress: false

jobs:
  run-task:
    runs-on: ubuntu-latest
    # ⏰ کافی برای بزرگ‌ترین تسک‌ها (max-turns 250 × ~5 sec/turn = ~21 min
    # + setup + overhead). 90 دقیقه buffer امن دارد.
    timeout-minutes: 90
    permissions:
      contents: write       # برای commit + push به main
      pull-requests: write  # ذخیره برای آینده (الان استفاده نمی‌کنیم)
      id-token: write       # احیاناً برای OIDC در آینده
    steps:
      - name: Checkout (full history برای push کردن)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # token پیش‌فرض ACTIONS_GITHUB_TOKEN است — برای push کفایت می‌کند.
          # برای جلوگیری از infinite loop، commit messages ما حاوی
          # [skip ci] خواهد بود تا re-trigger نشوند.

      - name: Run Claude Code (headless)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 250 --model claude-opus-4-8 --dangerously-skip-permissions"
          prompt: |
            وظیفه‌ات: **فقط یک تسک** را اجرا کن سپس exit کن.
            
            ## مرحله ۱ — لیست تسک‌ها را بگیر
            
            ```bash
            curl -s -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/next?watched_id=$WATCHED_ID&limit=1"
            ```
            
            اگر لیست خالی است → `echo 'no pending tasks'` و موفق exit کن.
            
            ## مرحله ۲ — اولین تسک را claim کن
            
            ```bash
            curl -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action"}' \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/claim"
            ```
            
            اگر 409 (دیگری claim کرده) → exit کن.
            
            ## مرحله ۳ — فایل تسک را کامل بخوان
            
            `cat prompt/<task_id>.md` (نه head/tail/sed). محتوا = پرامپت + AC + Steps.
            
            ## مرحله ۴ — کار را انجام بده
            
            هر AC را پیاده‌سازی کن. کد را با Edit/Write بنویس، تست کن.
            
            ## مرحله ۵ — commit و push مستقیم به main
            
            ```bash
            git add -A
            git commit -m "[<task_id>] <خلاصهٔ کوتاه>"
            git push origin main  # اگر rejected: git pull --rebase && git push
            ```
            
            هرگز PR نزن. هرگز branch جدا نساز. مستقیم به main.
            
            ## مرحله ۶ — complete اعلام کن
            
            ```bash
            curl -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action","summary":"<چه کاری شد>"}' \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/complete"
            ```
            
            سپس exit. (backend برای تسک بعدی workflow را دوباره trigger می‌کند.)
            
            ## در صورت شکست
            
            اگر در هر مرحله گیر افتادی:
            ```bash
            curl -X POST -H "X-External-Token: $OVERSIGHT_EXTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"agent_id":"claude-code-action","error":"<reason>"}' \
              "$OVERSIGHT_BACKEND_URL/api/external/prompts/<task_id>/fail"
            ```
            
            ## قواعد کلیدی
            
            - TO-DO فقط برای: credential کاربر، تصمیم سلیقه‌ای کاربر، account/billing
              سرویس خارجی. هرگز برای UI، endpoint، migration، test، integration
              (با stub بساز).
            - اگر تسک نیاز به credential دارد → /fail با reason "needs user credential".
            - مستقیم به main commit و push (no PR، no branch).
            - فقط **یک تسک** را در این run اجرا کن، سپس exit. هرگز loop نکن.
            
            ## ⏰ بودجهٔ turn
            
            max-turns = **250** (فضای کافی برای بزرگترین تسک‌ها). از تمام بودجه
            استفاده کن تا تسک را **کامل و درست** تمام کنی. هرگز عجله نکن، هرگز
            AC را skip نکن.
            
            **فقط در حالت اضطراری** (اگر بعد از ~220 turn هنوز کار تمام نشده،
            یعنی تسک واقعاً غیرعادی بزرگ است):
            1. commit + push آنچه تا الان انجام شده
            2. POST /fail با reason "task too large: completed N of M ACs"
            3. exit
            
            این فقط emergency است. برای تسک عادی، از همه بودجه استفاده کن تا
            complete واقعی بزنی.
        env:
          OVERSIGHT_BACKEND_URL: ${{ secrets.OVERSIGHT_BACKEND_URL }}
          OVERSIGHT_EXTERNAL_TOKEN: ${{ secrets.OVERSIGHT_EXTERNAL_TOKEN }}
          WATCHED_ID: "c9e90b2b-4141-4012-b343-5a5f60b0268a"
          REPO_FULL_NAME: "mahdighandi1989/quran-web-app-v1"
